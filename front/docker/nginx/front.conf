# docker/nginx/front.conf
# =============================================================================
# Configuration Nginx de production pour le frontend React (SPA)
# =============================================================================

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- Compression ---
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 256;

    # --- Headers de sécurité ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Assets avec hash : cache agressif (1 an) ---
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- index.html et config.js : jamais mis en cache ---
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location = /config.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # --- SPA : toutes les routes renvoient index.html ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Bloquer les fichiers sensibles ---
    location ~ /\.(env|git|htaccess) {
        deny all;
        return 404;
    }

    # --- Logs ---
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}