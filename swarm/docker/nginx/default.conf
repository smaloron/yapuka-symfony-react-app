# =============================================================================
# Configuration Nginx - Reverse proxy pour Yapuka
# =============================================================================
# Nginx sert de point d'entrée unique :
#   - /api/*  → redirigé vers le backend Symfony (PHP-FPM)
#   - /*      → redirigé vers le frontend React (Vite dev server)
#
# En production, Nginx servirait les fichiers statiques du frontend
# directement depuis le disque (après le build Vite).
# =============================================================================

server {
    listen 80;
    server_name localhost;

    # --- Taille maximale des requêtes (upload de fichiers) ---
    client_max_body_size 10M;

    # =========================================================================
    # Backend Symfony - Toutes les requêtes /api/*
    # =========================================================================
    location /api {
        # Rediriger vers PHP-FPM (conteneur "php")
        proxy_pass http://php:9000;

        # Transmettre les en-têtes originaux
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Configuration spéciale pour SSE (Server-Sent Events)
        # Désactiver le buffering pour que les événements arrivent en temps réel
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;  # Timeout long pour les connexions SSE
    }

    # =========================================================================
    # Backend Symfony - Fichiers PHP servis par PHP-FPM via FastCGI
    # =========================================================================
    location ~ ^/api/(.*)$ {
        root /var/www/api/public;

        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME /var/www/api/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/api/public;

        # Timeout étendu pour les requêtes longues (SSE, imports, etc.)
        fastcgi_read_timeout 300;

        # Désactiver le buffering pour SSE
        fastcgi_buffering off;
    }

    # =========================================================================
    # Frontend React - Toutes les autres requêtes
    # =========================================================================
    location / {
        # En développement : proxy vers le serveur Vite
        proxy_pass http://front:5173;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Support des WebSockets (utilisés par Vite HMR - Hot Module Replacement)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
