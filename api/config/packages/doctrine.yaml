# =============================================================================
# Configuration Doctrine ORM
# =============================================================================
# Connexion à la base de données PostgreSQL et mapping des entités.
# =============================================================================

doctrine:
    dbal:
        # L'URL de connexion est définie dans le fichier .env
        url: '%env(resolve:DATABASE_URL)%'
        driver: 'pdo_pgsql'
        charset: utf8

    orm:
        # Détection automatique des entités dans src/Entity
        auto_generate_proxy_classes: true
        enable_lazy_ghost_objects: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        auto_mapping: true
        mappings:
            App:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Entity'
                prefix: 'App\Entity'
                alias: App
